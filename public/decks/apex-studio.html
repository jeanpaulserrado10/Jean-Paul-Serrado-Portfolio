@keyframes expandW   { from { width: 0; }                               to { width: 100%; }                         }
@keyframes drawLine  { from { stroke-dashoffset: 1000; }                to { stroke-dashoffset: 0; }                }
@keyframes spin      { from { transform: rotate(0deg); }                to { transform: rotate(360deg); }           }
@keyframes pulse     { 0%,100% { opacity:.3; transform:scale(1); } 50% { opacity:.8; transform:scale(1.05); } }
@keyframes countUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideInUp { from { transform: translateY(100%); opacity:0; } to { transform: translateY(0); opacity:1; } }

/* ── Slide transition ── */

/* ── useCounter ── */
function useCounter(from, to, durationMs, active) {
  const [val, setVal] = useState(from);
  useEffect(() => {
    if (!active) {setVal(from);return;}
    const start = performance.now();
    const tick = (now) => {
      const p = Math.min((now - start) / durationMs, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(from + (to - from) * eased));
      if (p < 1) requestAnimationFrame(tick);
    };
    const raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [active, from, to, durationMs]);
  return val;
}

/* ── SLIDES REGISTRY ── */
const SLIDES = [Slide01, Slide02, Slide03, Slide04, Slide05, Slide06, Slide07, Slide08, Slide09, Slide10];

/* ── THEMES ── */
const THEMES = {
  apex:    { ink:'#0D0D0D', paper:'#F4F2ED', paper2:'#E8E6DF', red:'#E8333A', muted:'#8A8782', rule:'#D0CEC8' },
  atelier: { ink:'#0A0806', paper:'#F0E8DC', paper2:'#E4DDD0', red:'#C9A84C', muted:'#8A7D6A', rule:'#C8BCA8' },
  swiss:   { ink:'#0A0A0A', paper:'#FFFFFF', paper2:'#F0F0F0', red:'#0A0A0A', muted:'#767676', rule:'#DEDEDE' },
};

function applyTheme(mood, energy, tempo) {
  const th = THEMES[mood] || THEMES.apex;
  const r = document.documentElement;
  r.style.setProperty('--apex-speed',   tempo   === 'cinematic' ? '1.9' : '0.65');
  // We store these so slides can read them via CSS vars if needed
  r.dataset.mood   = mood;
  r.dataset.energy = energy;
  r.dataset.tempo  = tempo;
  // Directly update the JS token object so live slides pick it up on next render
  Object.assign(T, { ink: th.ink, paper: th.paper, paper2: th.paper2, red: th.red, muted: th.muted, rule: th.rule });
  // Force a re-render by bumping a global flag — App watches it
  window.__apexThemeVersion = (window.__apexThemeVersion || 0) + 1;
  window.__apexThemeChange && window.__apexThemeChange();
}

/* ── Tweaks Panel ── */
function TweaksPanel({ onClose }) {
  const [mood,   setMood]   = useState('apex');
  const [energy, setEnergy] = useState('heavy');
  const [tempo,  setTempo]  = useState('punchy');

  useEffect(() => { applyTheme(mood, energy, tempo); }, [mood, energy, tempo]);

  const seg = (label, opts, val, set) => (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontSize:11, letterSpacing:'0.14em', color:'rgba(244,242,237,0.35)', textTransform:'uppercase', marginBottom:10 }}>{label}</div>
      <div style={{ display:'grid', gridTemplateColumns:`repeat(${opts.length},1fr)`, background:'rgba(255,255,255,0.06)', borderRadius:10, padding:3, gap:3 }}>
        {opts.map(([k, lbl]) => (
          <button key={k} onClick={() => set(k)} style={{
            appearance:'none', border:0, padding:'9px 6px', borderRadius:8, cursor:'pointer',
            fontFamily:'DM Mono', fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase',
            transition:'all .18s',
            background: val === k ? '#E8333A' : 'transparent',
            color:      val === k ? '#fff'    : 'rgba(244,242,237,0.5)',
          }}>{lbl}</button>
        ))}
      </div>
    </div>
  );

  const moods   = [['apex','Apex'],['atelier','Atelier'],['swiss','Swiss']];
  const energies = [['heavy','Heavy'],['refined','Refined']];
  const tempos  = [['punchy','Punchy'],['cinematic','Cinematic']];

  return (
    <div style={{
      position:'fixed', right:24, top:24, zIndex:9999,
      background:'rgba(13,13,13,0.96)', border:'1px solid rgba(244,242,237,0.14)',
      borderRadius:14, padding:'18px 20px', minWidth:264,
      fontFamily:'DM Mono', backdropFilter:'blur(14px)',
      boxShadow:'0 24px 64px rgba(0,0,0,0.7)',
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22 }}>
        <span style={{ fontSize:11, letterSpacing:'0.22em', color:'rgba(244,242,237,0.4)', textTransform:'uppercase' }}>Tweaks</span>
        <button onClick={onClose} style={{ appearance:'none', border:0, background:'none', color:'rgba(244,242,237,0.4)', cursor:'pointer', fontSize:20, lineHeight:1 }}>×</button>
      </div>
      {seg('Studio Mood',   moods,   mood,   setMood)}
      {seg('Type Energy',   energies,energy, setEnergy)}
      {seg('Motion Tempo',  tempos,  tempo,  setTempo)}
      <div style={{ fontSize:10, letterSpacing:'0.08em', color:'rgba(244,242,237,0.18)', lineHeight:1.6, textAlign:'center', marginTop:4 }}>
        Reshapes palette · type weight · animation rhythm
      </div>
    </div>
  );
}

/* ── LIGHT SLIDES (white/cream bg) ── */
const LIGHT_SLIDES = new Set([1, 3, 5, 7]);

/* ── MAIN APP ── */
function App() {
  const [current,  setCurrent]  = useState(0);
  const [prev,     setPrev]     = useState(null);
  const [dir,      setDir]      = useState(1);
  const [animKeys, setAnimKeys] = useState(Array(TOTAL).fill(0));
  const [showTweaks, setShowTweaks] = useState(false);
  const [themeVer,   setThemeVer]   = useState(0);
  const transRef   = useRef(false);
  const currentRef = useRef(0);

  useEffect(() => {
    applyTheme('apex', 'heavy', 'punchy');
    window.__apexThemeChange = () => setThemeVer(v => v + 1);
    return () => { window.__apexThemeChange = null; };
  }, []);

  useEffect(() => {
    const handler = (ev) => {
      const d = ev.data || {};
      if (d.type === '__activate_edit_mode')   setShowTweaks(true);
      if (d.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e) {}
    return () => window.removeEventListener('message', handler);
  }, []);

  const navigate = useCallback((n) => {
    if (n < 0 || n >= TOTAL || transRef.current) return;
    const cur = currentRef.current;
    setDir(n > cur ? 1 : -1);
    setPrev(cur);
    transRef.current = true;
    setTimeout(() => {
      setCurrent(n);
      currentRef.current = n;
      setAnimKeys(k => k.map((v, i) => i === n ? v + 1 : v));
      setPrev(null);
      transRef.current = false;
    }, 620);
  }, []);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') navigate(currentRef.current + 1);
      if (e.key === 'ArrowLeft') navigate(currentRef.current - 1);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [navigate]);

  const [scale, setScale] = useState(1);
  const W = 1280, H = 720;
  useEffect(() => {
    const fit = () => setScale(Math.min(window.innerWidth / W, window.innerHeight / H));
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  const onPrev  = useCallback(() => navigate(currentRef.current - 1), [navigate]);
  const onNext  = useCallback(() => navigate(currentRef.current + 1), [navigate]);
  const isLight = LIGHT_SLIDES.has(current);

  return (
    <div style={{ width:'100vw', height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#0D0D0D', overflow:'hidden' }}>
      <div style={{ width:W, height:H, position:'relative', transformOrigin:'center center', transform:`scale(${scale})`, flexShrink:0 }}>
        {prev !== null && (() => {
          const PrevSlide = SLIDES[prev];
          return (
            <div style={{ position:'absolute', inset:0, zIndex:1 }} className={dir > 0 ? 'exiting-fwd' : 'exiting-back'}>
              <PrevSlide akey={animKeys[prev]} active={false}/>
            </div>
          );
        })()}
        <div style={{ position:'absolute', inset:0, zIndex:2 }} className={prev !== null ? (dir > 0 ? 'entering-fwd' : 'entering-back') : ''}>
          {React.createElement(SLIDES[current], { akey: animKeys[current], active: prev === null, themeVer })}
        </div>
        <Chrome slide={current} total={TOTAL} onPrev={onPrev} onNext={onNext} light={isLight}/>
      </div>
      {showTweaks && (
        <TweaksPanel onClose={() => {
          setShowTweaks(false);
          try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch(e) {}
        }}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
